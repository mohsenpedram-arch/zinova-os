name: Create Knowledge Base Folders and Files

on:
  workflow_dispatch:  # با زدن دکمه "Run workflow" در گیت‌هاب اجرا می‌شود

jobs:
  create-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create knowledge base folders and sample files
        run: |
          mkdir -p knowledge/standards
          mkdir -p knowledge/charging
          mkdir -p knowledge/sourcing
          
          # فایل IEC61851.md
          cat > knowledge/standards/IEC61851.md << 'EOF'
  # IEC 61851-1 – General Requirements

  ## Scope
  Applies to EV supply equipment for charging electric road vehicles, with a rated supply voltage up to 1 000 V AC or 1 500 V DC.

  ## Relevance to Zinova
  Defines the four charging modes (Mode 1 to Mode 4). Specific Mode 2 requirements are covered by IEC 62752.

  ## Key Concepts for Nomad
  - **Mode 2**: Connection to a standard socket-outlet with an in-cable control and protection device (IC-CPD).
  - **Pilot Function**: The control pilot (CP) circuit enables communication between the vehicle and the charging equipment before and during charging, ensuring safety.
  - **Vehicle Side**: The actual battery charger is inside the vehicle for AC charging (Modes 1–3). Mode 4 chargers supply DC directly.
  EOF
          
          # فایل IEC62196.md
          cat > knowledge/standards/IEC62196.md << 'EOF'
  # IEC 62196-2 – Plugs, Socket-outlets, Vehicle Connectors

  ## Scope
  Dimensional compatibility requirements for AC pin and contact-tube accessories for EVs.

  ## Relevance to Zinova
  Zinova Nomad uses a Type 2 female plug (IEC 62196-2) for the vehicle connector.

  ## Important Note
  The EV socket-outlets and EV plugs covered by this standard are intended for charging mode 3 only. Mode 2 uses the same connector standard.
  EOF
          
          # فایل IEC62752.md (قبلاً داده شد، دوباره می‌نویسیم)
          cat > knowledge/standards/IEC62752.md << 'EOF'
  # IEC 62752 – In‑Cable Control and Protection Device (IC‑CPD)

  ## Scope
  Mode 2 charging of electric vehicles. Mandatory for portable chargers.

  ## Key Requirements for Zinova Nomad
  - 6mA DC leakage detection (smooth DC)
  - Ground continuity monitoring
  - Temperature monitoring (plug, control box)
  - Pilot signal (CP) according to IEC 61851‑1
  - Automatic restart prohibition after critical fault

  ## Red Flags
  - "IEC62752 equivalent" → not accepted
  - Self‑declared certificate without lab test report → reject
  - No test report for 6mA DC → reject
  EOF
          
          # فایل mode2.md
          cat > knowledge/charging/mode2.md << 'EOF'
  # Mode 2 Charging

  ## Definition
  Mode 2 refers to the use of a charging cable that plugs into a standard household socket (single or three-phase) and includes a control box. This box is called the In-Cable Control and Protection Device (IC-CPD).

  ## Characteristics
  - Charging is slow (typically 6-8 hours).
  - The IC-CPD provides safety functions like ground fault (RCD) and overcurrent protection.
  - Communication is limited compared to Mode 3.
  EOF
          
          # فایل mode3.md
          cat > knowledge/charging/mode3.md << 'EOF'
  # Mode 3 Charging

  ## Definition
  Mode 3 charging uses a dedicated EV charging station (wallbox) with a fixed cable or socket. Communication between the charger and the vehicle is managed via the control pilot (CP) signal according to IEC 61851-1. This is the standard for home and public AC charging points.
  
  ## Key Features
  - Typically 7.4kW (single-phase) to 22kW (three-phase) in Europe.
  - Requires a dedicated installation and can include smart features like OCPP, RFID, and load balancing.
  - Generally safer and more reliable than Mode 2.
  EOF
          
          # فایل ocpp.md
          cat > knowledge/charging/ocpp.md << 'EOF'
  # OCPP (Open Charge Point Protocol)

  ## Definition
  OCPP is an application protocol for communication between EV charging stations (charge points) and a central management system.

  ## Version 1.6
  OCPP 1.6 uses a JSON format (OCPP-J) and is widely supported. It can manage networks of ten or more chargers.

  ## Key Functions for Zinova
  - **Authorization**: Checking if a user is allowed to start a session.
  - **Transaction Management**: Starting and stopping sessions, and reporting energy usage (MeterValues).
  - **Remote Control**: Remotely stopping a transaction is a standard feature. Starting a transaction from the cloud is possible but requires careful security consideration.
  EOF
          
          # فایل china_oem_signals.md
          cat > knowledge/sourcing/china_oem_signals.md << 'EOF'
  # China Sourcing – OEM vs. Trading Company Signals

  ## Positive Signals (Boost Score)
  - **OEM Specific Terms on Business License**: Look for "Manufacturing" (制造), "Processing" (加工), or "Production" (生产).
  - **Can Issue a 17% VAT Invoice**: Only qualified manufacturers can do this.
  - **Discusses Tooling, Molds, and PCB Modifications**: Real OEM understands engineering details.
  - **Industrial Zone Address**: Factory in industrial area, not commercial building.

  ## Negative Signals (Penalize or Reject)
  - **Address Mismatch**: Registration address vs. factory address.
  - **Vague or Evasive Technical Answers**: Cannot answer specific process questions.
  - **Unrealistic Price**: 30-50% below market average.
  - **Email Address on Generic Domain**: Gmail, Yahoo, QQ instead of company domain.

  > Note: Many suppliers are hybrids. Always verify that the specific product is made in their own factory.
  EOF
          
          # فایل fake_supplier_patterns.md
          cat > knowledge/sourcing/fake_supplier_patterns.md << 'EOF'
  # Fake Supplier Patterns and Sourcing Scams

  ## Common Scam Patterns
  - **Fake Material Scams**: Good sample → inferior mass production (e.g., iron slabs coated with copper instead of real copper plates).
  - **Bait-and-Switch**: Perfect sample → switch to cheap components after large order.
  - **Brand Impersonation**: Fake profiles using legitimate brand name and photos.

  ## Prevention
  - Hold 20-30% payment until independent pre-shipment inspection (PSI).
  - Always request a live video call showing the production line.
  - Reject if they refuse video call.
  - Use Alibaba Trade Assurance or secure payment. Never wire 100% upfront.
  EOF
          
      - name: Commit and push
        run: |
          git config user.name "Zinova-Agent"
          git config user.email "agent@zinova.org"
          git add knowledge/
          git diff --cached --quiet || git commit -m "feat: add knowledge base folders and content"
          git push
