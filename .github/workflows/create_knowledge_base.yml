namename: Create Knowledge Base Folders and Files

on:
  workflow_dispatch:

jobs:
  create-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p knowledge/standards
          mkdir -p knowledge/charging
          mkdir -p knowledge/sourcing

      - name: Create IEC61851.md
        run: |
          echo "# IEC 61851-1 – General Requirements" > knowledge/standards/IEC61851.md
          echo "" >> knowledge/standards/IEC61851.md
          echo "## Scope" >> knowledge/standards/IEC61851.md
          echo "Applies to EV supply equipment for charging electric road vehicles." >> knowledge/standards/IEC61851.md

      - name: Create IEC62196.md
        run: |
          echo "# IEC 62196-2 – Plugs, Socket-outlets, Vehicle Connectors" > knowledge/standards/IEC62196.md
          echo "" >> knowledge/standards/IEC62196.md
          echo "Zinova Nomad uses Type 2 connector." >> knowledge/standards/IEC62196.md

      - name: Create IEC62752.md
        run: |
          echo "# IEC 62752 – IC-CPD" > knowledge/standards/IEC62752.md
          echo "" >> knowledge/standards/IEC62752.md
          echo "Mandatory for Mode 2 chargers. Requires 6mA DC leakage detection." >> knowledge/standards/IEC62752.md

      - name: Create mode2.md
        run: |
          echo "# Mode 2 Charging" > knowledge/charging/mode2.md
          echo "Charging from standard socket with IC-CPD." >> knowledge/charging/mode2.md

      - name: Create mode3.md
        run: |
          echo "# Mode 3 Charging" > knowledge/charging/mode3.md
          echo "Dedicated wallbox with control pilot." >> knowledge/charging/mode3.md

      - name: Create ocpp.md
        run: |
          echo "# OCPP" > knowledge/charging/ocpp.md
          echo "Open Charge Point Protocol for communication." >> knowledge/charging/ocpp.md

      - name: Create china_oem_signals.md
        run: |
          echo "# China OEM Signals" > knowledge/sourcing/china_oem_signals.md
          echo "Look for manufacturing license, factory address, VAT invoice." >> knowledge/sourcing/china_oem_signals.md

      - name: Create fake_supplier_patterns.md
        run: |
          echo "# Fake Supplier Patterns" > knowledge/sourcing/fake_supplier_patterns.md
          echo "Bait-and-switch, fake material scams, brand impersonation." >> knowledge/sourcing/fake_supplier_patterns.md

      - name: Commit and push
        run: |
          git config user.name "Zinova-Agent"
          git config user.email "agent@zinova.org"
          git add knowledge/
          git diff --cached --quiet || git commit -m "feat: add knowledge base with minimal content"
          git push
